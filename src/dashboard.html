<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --text: #e8e8f0;
    --muted: #4a4a6a;
    --green: #00ff87;
    --red: #ff3366;
    --gold: #ffd166;
    --accent: #6c63ff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    padding: 2rem;
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(108,99,255,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 100%, rgba(0,255,135,0.05) 0%, transparent 60%);
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 3rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-size: 2rem;
    font-weight: 800;
    letter-spacing: -1px;
  }

  .logo span { color: var(--green); }

  .date-badge {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1.5rem;
  }

  @media (max-width: 900px) {
    .grid { grid-template-columns: 1fr; }
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    animation: fadeUp 0.6s ease forwards;
    opacity: 0;
    transform: translateY(20px);
  }

  .panel:nth-child(1) { animation-delay: 0.1s; }
  .panel:nth-child(2) { animation-delay: 0.2s; }
  .panel:nth-child(3) { animation-delay: 0.3s; }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  .panel-header {
    padding: 1.25rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .panel-header h2 {
    font-size: 0.85rem;
    font-weight: 400;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .dot-green { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .dot-red { background: var(--red); box-shadow: 0 0 8px var(--red); }
  .dot-gold { background: var(--gold); box-shadow: 0 0 8px var(--gold); }

  .panel-body { padding: 0.5rem 0; }

  .row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.75rem 1.5rem;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
    animation: rowIn 0.4s ease forwards;
    opacity: 0;
  }

  .row:last-child { border-bottom: none; }
  .row:hover { background: rgba(255,255,255,0.03); }

  @keyframes rowIn {
    to { opacity: 1; }
  }

  .ticker {
    font-family: 'Space Mono', monospace;
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--text);
    min-width: 60px;
  }

  .price {
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    color: var(--muted);
    flex: 1;
    text-align: center;
  }

  .change {
    font-family: 'Space Mono', monospace;
    font-size: 0.85rem;
    font-weight: 700;
    text-align: right;
    min-width: 70px;
  }

  .change.positive { color: var(--green); }
  .change.negative { color: var(--red); }
  .change.volume { color: var(--gold); }

  .loading {
    padding: 2rem 1.5rem;
    text-align: center;
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 2px;
  }

  .error {
    padding: 1.5rem;
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: var(--red);
  }

  .rank {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    min-width: 20px;
  }
</style>
</head>
<body>

<header>
  <div class="logo">STOCK<span>PIPE</span></div>
  <div class="date-badge" id="current-date"></div>
</header>

<div class="grid">
  <div class="panel" id="gainers-panel">
    <div class="panel-header">
      <div class="dot dot-green"></div>
      <h2>Top Gainers</h2>
    </div>
    <div class="panel-body" id="gainers-body">
      <div class="loading">LOADING...</div>
    </div>
  </div>

  <div class="panel" id="losers-panel">
    <div class="panel-header">
      <div class="dot dot-red"></div>
      <h2>Top Losers</h2>
    </div>
    <div class="panel-body" id="losers-body">
      <div class="loading">LOADING...</div>
    </div>
  </div>

  <div class="panel" id="volume-panel">
    <div class="panel-header">
      <div class="dot dot-gold"></div>
      <h2>Top Volume</h2>
    </div>
    <div class="panel-body" id="volume-body">
      <div class="loading">LOADING...</div>
    </div>
  </div>
</div>

<script>
  const BASE = 'http://localhost:8000';

  document.getElementById('current-date').textContent =
    new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

  function formatVolume(v) {
    if (v >= 1e9) return (v / 1e9).toFixed(1) + 'B';
    if (v >= 1e6) return (v / 1e6).toFixed(1) + 'M';
    return v.toLocaleString()
  }

  async function loadGainers() {
    try {
      const res = await fetch(`${BASE}/top_gainers`);
      const data = await res.json();
      const body = document.getElementById('gainers-body');
      body.innerHTML = data.map((s, i) => `
        <div class="row" style="animation-delay:${i * 0.05}s">
          <span class="rank">${String(i+1).padStart(2,'0')}</span>
          <span class="ticker">${s.ticker}</span>
          <span class="price">$${s.price}</span>
          <span class="change positive">+${s.pct_change}%</span>
        </div>
      `).join('');
    } catch(e) {
      document.getElementById('gainers-body').innerHTML = '<div class="error">Failed to load</div>';
    }
  }

  async function loadLosers() {
    try {
      const res = await fetch(`${BASE}/top_losers`);
      const data = await res.json();
      const body = document.getElementById('losers-body');
      body.innerHTML = data.map((s, i) => `
        <div class="row" style="animation-delay:${i * 0.05}s">
          <span class="rank">${String(i+1).padStart(2,'0')}</span>
          <span class="ticker">${s.ticker}</span>
          <span class="price">$${s.price}</span>
          <span class="change negative">${s.pct_change}%</span>
        </div>
      `).join('');
    } catch(e) {
      document.getElementById('losers-body').innerHTML = '<div class="error">Failed to load</div>';
    }
  }

  async function loadVolume() {
    try {
      const res = await fetch(`${BASE}/top_volume`);
      const data = await res.json();
      const body = document.getElementById('volume-body');
      body.innerHTML = data.map((s, i) => `
        <div class="row" style="animation-delay:${i * 0.05}s">
          <span class="rank">${String(i+1).padStart(2,'0')}</span>
          <span class="ticker">${s.ticker}</span>
          <span class="price">$${s.price}</span>
          <span class="change volume">${formatVolume(s.volume)}</span>
        </div>
      `).join('');
    } catch(e) {
      document.getElementById('volume-body').innerHTML = '<div class="error">Failed to load</div>';
    }
  }

  loadGainers();
  loadLosers();
  loadVolume();
  setInterval(() => {
  loadGainers();
  loadLosers();
  loadVolume();
}, 60000);
</script>
</body>
</html>
